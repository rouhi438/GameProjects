<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <title>TicTacToe</title>
  </head>
  <body class="night">
    <div class="container">
      <header>
        <div class="volume">
          <span><i class="bi bi-volume-up"></i></span>
          <span><i class="bi bi-volume-mute hidden"></i></span>
        </div>
        <div class="mode" id="mode">
          <span class="mode-text">Light Mode</span>
          <i class="bi bi-sun-fill icon"></i>
        </div>
      </header>
      <div class="board"></div>
      <div class="game-controls">
        <p id="status">Winner : <span class="status"></span></p>
        <button id="restart">Restart</button>
      </div>
    </div>
    <footer>
      <div class="socials">
        <a href="https://github.com/rouhi438" target="_blank"
          ><i class="fa-brands fa-github"></i
        ></a>
        <a href="https://linkedin.com/in/rouhi438" target="_blank"
          ><i class="fa-brands fa-linkedin"></i
        ></a>
        <a href="https://codepen.io/rouhi438" target="_blank"
          ><i class="fa-brands fa-codepen"></i
        ></a>
        <a href="https://freecodecamp.org/rouhi438" target="_blank"
          ><i class="fa-brands fa-free-code-camp"></i
        ></a>
      </div>
      <hr />
      <p>
        © 2026
        <a
          href="https://rouhi438.github.io/RainBow/my-cv-template/"
          target="_blank"
          >Abbas R.hansen</a
        >. All rights reserved.
      </p>
    </footer>
    <script src="app.js" defer></script>
  </body>
</html>
